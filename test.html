<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Prueba sync tldraw</title>
    <style>
      html, body, #root { margin: 0; height: 100%; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      import React from 'https://esm.sh/react@19'
      import { createRoot } from 'https://esm.sh/react-dom@19/client'
      import { Tldraw } from 'https://esm.sh/tldraw@4.0.4'
      import { useSync } from 'https://esm.sh/@tldraw/sync@4.0.4'
      import 'https://esm.sh/tldraw@4.0.4/tldraw.css'

      // Cambia esto por la URL pública de tu servidor de sync en Coolify.
      // En local sería ws://localhost:5858
      const HOST = 'ws://localhost:5858'

      function App() {
        const store = useSync({
          uri: `${HOST}/connect/croma`,
          // Sin assets todavía: insertar imágenes fallará, es esperado en este paso.
          assets: { async upload() { throw new Error('sin assets aun') }, resolve: (a) => a.props.src },
        })
        return React.createElement(Tldraw, { store })
      }

      createRoot(document.getElementById('root')).render(React.createElement(App))
    </script>
  </body>
</html>
